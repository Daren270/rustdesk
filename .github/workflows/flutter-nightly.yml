name: Flutter Nightly Build

on:
  # Harmonogram nocny WYŁĄCZONY celowo (pomoc): build tylko na żądanie,
  # żeby nie wypychać codziennie nieprzetestowanych buildów do rodziny.
  # Rebuild: Actions -> Flutter Nightly Build -> Run workflow (albo gh workflow run).
  workflow_dispatch:

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
